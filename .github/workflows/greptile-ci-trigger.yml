name: Trigger Greptile CI

on:
  workflow_dispatch:
  push:
    branches:
      - cursor/dependabot-groups-9b70
    paths:
      - .github/workflows/greptile-ci-trigger.yml

jobs:
  trigger-greptile:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment @greptileci on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:cursor/dependabot-groups-9b70`,
              state: 'open',
            });

            if (prs.length === 0) {
              core.setFailed('No open PR found for branch cursor/dependabot-groups-9b70');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs[0].number,
              body: '@greptileci',
            });
