name: Sync - Package Versions

# This workflow is responsible for synchronizing the versions of Devopness packages that are
# not published to npm but are managed by changesets. These packages have a package.json file
# solely for version management purposes, even though they are not npm packages.
#
# For example, Python packages use this workflow to sync the version specified in their
# pyproject.toml file with the version managed by changesets in the package.json file.
#
# Additionally, to avoid errors during changeset operations, this workflow ensures that the
# versions of these packages are also synchronized in the root package-lock.json file.

on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    paths:
      - '**/package*.json'
      - 'packages/**/CHANGELOG.md'
      - '.changeset/**'
    branches:
      # Triggered by pushes from the changesets bot (GITHUB_TOKEN suppresses pull_request events,
      # so the push trigger on this branch is the only way to catch changeset-driven updates)
      - 'changeset-release/*'

permissions:
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.head_ref || github.ref }}

jobs:
  detect-changes:
    name: Detect changes in package.json files
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      has_package_changes: ${{ steps.filter.outputs.has_package_changes }}
      should_sync_lockfile: ${{ steps.filter.outputs.should_sync_lockfile }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            has_package_changes:
              - 'package.json'
              - 'packages/**/package.json'
            should_sync_lockfile:
              - '**/package*.json'
              - 'packages/**/CHANGELOG.md'
              - '.changeset/**'

  load-pypi-projects:
    name: Load Python packages matrix
    needs: detect-changes
    # Skip fork PRs: GITHUB_TOKEN cannot push to a fork's branch, so these sync jobs would always fail
    if: >
      needs.detect-changes.outputs.has_package_changes == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) &&
      ((github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
       github.event_name == 'push')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Load matrix of Pypi projects
        id: set-matrix
        run: |
          MATRIX=$(cat .github/configs/python-packages.json | jq -c .)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  sync-pypi-package-versions:
    name: Sync pyproject.toml
    needs: [detect-changes, load-pypi-projects]
    # Skip fork PRs: GITHUB_TOKEN cannot push to a fork's branch, so these sync jobs would always fail
    if: >
      needs.detect-changes.outputs.has_package_changes == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) &&
      ((github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
       github.event_name == 'push')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.load-pypi-projects.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.head_ref || github.ref_name }}
          # A PAT is required so the commit pushed back triggers downstream CI workflows;
          # commits pushed with GITHUB_TOKEN are suppressed by GitHub to prevent loops
          token: ${{ secrets.DEVOPNESS_AUTOMATION_PAT }}

      - name: Set up git identity
        run: |
          git config --global user.email "${{ vars.DEVOPNESS_AUTOMATIONS_EMAIL }}"
          git config --global user.name "${{ vars.DEVOPNESS_AUTOMATIONS_USERNAME }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Sync '${{ matrix.name }}' version
        run: |
          CHANGESET_PACKAGE_VERSION=$(jq -r .version "${{ matrix.path }}/package.json")
          sed -i "s/^version = \".*\"/version = \"${CHANGESET_PACKAGE_VERSION}\"/" "${{ matrix.path }}/pyproject.toml"

      - name: Run post-version-sync commands for '${{ matrix.name }}'
        if: matrix.post_version_sync_commands != ''
        working-directory: ${{ matrix.path }}
        run: bash -c "${{ matrix.post_version_sync_commands }}"

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: sync '${{ matrix.name }}' version"
          file_pattern: '${{ matrix.path }}/pyproject.toml ${{ matrix.path }}/*.lock'
          commit_user_name: ${{ vars.DEVOPNESS_AUTOMATIONS_USERNAME }}
          commit_user_email: ${{ vars.DEVOPNESS_AUTOMATIONS_EMAIL }}

  sync-main-lockfile:
    name: Sync the package-lock.json
    # Runs after sync-pypi-package-versions to avoid parallel push races on the same branch
    needs: [detect-changes, sync-pypi-package-versions]
    # Skip fork PRs: GITHUB_TOKEN cannot push to a fork's branch, so these sync jobs would always fail
    if: >
      needs.detect-changes.outputs.should_sync_lockfile == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) &&
      ((github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
       github.event_name == 'push') &&
      always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.head_ref || github.ref_name }}
          # A PAT is required so the commit pushed back triggers downstream CI workflows;
          # commits pushed with GITHUB_TOKEN are suppressed by GitHub to prevent loops
          token: ${{ secrets.DEVOPNESS_AUTOMATION_PAT }}

      - name: Set up git identity
        run: |
          git config --global user.email "${{ vars.DEVOPNESS_AUTOMATIONS_EMAIL }}"
          git config --global user.name "${{ vars.DEVOPNESS_AUTOMATIONS_USERNAME }}"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Sync workspace versions in lockfile
        run: npm install --workspaces

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update package-lock.json'
          file_pattern: 'package-lock.json'
          commit_user_name: ${{ vars.DEVOPNESS_AUTOMATIONS_USERNAME }}
          commit_user_email: ${{ vars.DEVOPNESS_AUTOMATIONS_EMAIL }}

  verify-sync:
    name: Verify sync of package versions
    needs: [detect-changes, sync-pypi-package-versions, sync-main-lockfile]
    if: >
      ((github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
       github.event_name == 'push')
      && (needs.detect-changes.outputs.has_package_changes == 'true' || needs.detect-changes.outputs.should_sync_lockfile == 'true')
      && always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # For non-fork PRs and pushes: the sync jobs ran — fail if they did not succeed
      - name: Fail if sync-pypi-package-versions did not succeed
        if: >
          needs.detect-changes.outputs.has_package_changes == 'true' &&
          (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          if [ "${{ needs.sync-pypi-package-versions.result }}" = "failure" ] || [ "${{ needs.sync-pypi-package-versions.result }}" = "cancelled" ]; then
            echo "❌ Job 'sync-pypi-package-versions' failed or was cancelled"
            exit 1
          fi

      - name: Fail if sync-main-lockfile did not succeed
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ "${{ needs.sync-main-lockfile.result }}" = "failure" ] || [ "${{ needs.sync-main-lockfile.result }}" = "cancelled" ]; then
            echo "❌ Job 'sync-main-lockfile' failed or was cancelled"
            exit 1
          fi

      # For fork PRs: the sync jobs were skipped (can't push to a fork), so validate read-only instead
      - name: Set up Node (fork PR lockfile check)
        if: >
          needs.detect-changes.outputs.should_sync_lockfile == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Fail if package-lock.json is out of sync (fork PR)
        if: >
          needs.detect-changes.outputs.should_sync_lockfile == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          npm install --workspaces
          if ! git diff --exit-code package-lock.json; then
            echo "❌ package-lock.json is out of sync — run 'npm install --workspaces' locally and commit the result"
            exit 1
          fi

      - name: Fail if pyproject.toml versions are out of sync (fork PR)
        if: >
          needs.detect-changes.outputs.has_package_changes == 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          PACKAGES=$(cat .github/configs/python-packages.json | jq -r '.[].path')
          FAILED=false
          for PKG_PATH in $PACKAGES; do
            EXPECTED=$(jq -r .version "$PKG_PATH/package.json")
            ACTUAL=$(grep -m1 '^version = ' "$PKG_PATH/pyproject.toml" | sed 's/version = "\(.*\)"/\1/')
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "❌ $PKG_PATH/pyproject.toml version ('$ACTUAL') does not match package.json ('$EXPECTED')"
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then exit 1; fi
