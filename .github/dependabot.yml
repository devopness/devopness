version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  groups:
    # Group naming: unprefixed = repo-wide (workspace packages), ui-react-* / sdk-js-* = package-specific.
    # Storybook first: eslint-plugin-storybook also matches eslint-* in linters.
    linters:
      patterns:
        - "typescript-eslint"
        - "@typescript-eslint/*"
        - "eslint"
        - "@eslint/*"
        - "eslint-*"
        - "prettier"
        - "prettier-*"
        - "@ianvs/prettier-plugin-sort-imports"
        - "typescript"
    ui-react-vite:
      patterns:
        - "vite"
        - "@vitejs/*"
        - "vite-*"
        - "vitest"
        - "@vitest/*"
    sdk-js-viteplus:
      patterns:
        - "vite-plus"
        - "typescript"
        - "@types/parse-link-header"
        - "axios"
        - "axios-mock-adapter"
        - "typedoc"
        - "husky"
    ui-react-storybook:
      patterns:
        - "storybook"
        - "@storybook/*"
        - "eslint-plugin-storybook"

- package-ecosystem: pip
  directories:
    - "/packages/sdks/python"
  schedule:
    interval: daily
  open-pull-requests-limit: 10

- package-ecosystem: npm
  directory: "/docs"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  groups:
    # Group naming: docs-* = scoped to the /docs npm ecosystem.
    docs-fumadocs:
      patterns:
        - "fumadocs-*"
    docs-viteplus:
      patterns:
        - "vite-plus"
        - "typescript"
        - "@types/node"
        - "@types/react"
        - "@types/react-dom"
        - "@types/mdx"
    docs-tailwind:
      patterns:
        - "tailwindcss"
        - "@tailwindcss/*"
    docs-next:
      patterns:
        - "next"
