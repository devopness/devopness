version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  groups:
    # Storybook first: eslint-plugin-storybook also matches eslint-* below.
    storybook:
      patterns:
        - "storybook"
        - "@storybook/*"
        - "eslint-plugin-storybook"
    typescript-eslint:
      patterns:
        - "typescript-eslint"
        - "@typescript-eslint/*"
    eslint:
      patterns:
        - "eslint"
        - "@eslint/*"
        - "eslint-*"
    prettier:
      patterns:
        - "prettier"
        - "prettier-*"
        - "@ianvs/prettier-plugin-sort-imports"
    typescript:
      patterns:
        - "typescript"
    jest:
      patterns:
        - "jest"
        - "ts-jest"
        - "@types/jest"
    vitest:
      patterns:
        - "vitest"
        - "@vitest/*"
    vite:
      patterns:
        - "vite"
        - "@vitejs/*"
        - "vite-*"

- package-ecosystem: pip
  directories:
    - "/packages/sdks/python"
  schedule:
    interval: daily
  open-pull-requests-limit: 10

- package-ecosystem: npm
  directory: "/docs"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  groups:
    fumadocs:
      patterns:
        - "fumadocs-*"
    typescript-eslint:
      patterns:
        - "typescript-eslint"
        - "@typescript-eslint/*"
    eslint:
      patterns:
        - "eslint"
        - "@eslint/*"
        - "eslint-*"
        - "@next/eslint-plugin-next"
    prettier:
      patterns:
        - "prettier"
        - "prettier-*"
        - "@ianvs/prettier-plugin-sort-imports"
    typescript:
      patterns:
        - "typescript"
        - "@types/node"
        - "@types/react"
        - "@types/react-dom"
        - "@types/mdx"
    next:
      patterns:
        - "next"
    tailwind:
      patterns:
        - "tailwindcss"
        - "@tailwindcss/*"
        - "prettier-plugin-tailwindcss"
